<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="שעון נוכחות">
  <title>שעון נוכחות</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 1.3em; margin: 20px 0 4px; color: #a0c4ff; }
    #clock { font-size: 3em; font-weight: bold; margin: 10px 0; letter-spacing: 3px; }
    #date-display { font-size: 0.9em; color: #aaa; margin-bottom: 20px; }
    .btn {
      width: 100%; max-width: 340px;
      padding: 20px; font-size: 1.2em; font-weight: bold;
      border: none; border-radius: 14px; cursor: pointer;
      margin: 8px 0; transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; }
    #btn-in   { background: #27ae60; color: white; }
    #btn-out  { background: #e74c3c; color: white; }
    #btn-sub  { background: #2980b9; color: white; margin-top: 16px; }
    #btn-view { background: #555; color: white; font-size: 0.9em; padding: 12px; }
    #status {
      margin: 12px 0; padding: 12px 16px; border-radius: 10px;
      font-size: 0.95em; text-align: center;
      max-width: 340px; width: 100%; display: none;
    }
    #status.ok  { background:#1e3a2e; border:1px solid #27ae60; color:#27ae60; }
    #status.err { background:#3a1e1e; border:1px solid #e74c3c; color:#e74c3c; }
    #status.info{ background:#1e2a3a; border:1px solid #2980b9; color:#7fb3d3; }
    #records-panel {
      width: 100%; max-width: 340px;
      background: #252540; border-radius: 12px;
      margin-top: 14px; overflow: hidden; display: none;
    }
    #records-panel h3 { padding: 10px 14px; background: #333; font-size: 0.95em; }
    .rec-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; border-bottom: 1px solid #333; font-size: 0.88em;
    }
    .rec-row .date { color: #aaa; }
    .rec-row .times { color: white; }
    .rec-row .del { color: #e74c3c; cursor: pointer; padding: 2px 6px; }
    .rec-row.submitted { opacity: 0.5; }
    #config-link { margin-top: 16px; font-size: 0.78em; color: #555; }
    #config-link a { color: #a0c4ff; }
    .badge {
      display: inline-block; background: #e74c3c;
      color: white; border-radius: 10px; font-size: 0.7em;
      padding: 2px 7px; margin-right: 6px; vertical-align: middle;
    }
    .actions { display: flex; gap: 4px; align-items: center; }
    .edit   { color: #a0c4ff; cursor: pointer; padding: 2px 6px; }
    .save   { color: #27ae60; cursor: pointer; padding: 2px 6px; }
    .cancel { color: #aaa;    cursor: pointer; padding: 2px 6px; }
    .rec-row input[type="time"] {
      background: #333; border: 1px solid #555; color: white;
      border-radius: 6px; padding: 2px 4px; font-size: 0.85em; width: 76px;
    }
  </style>
</head>
<body>
<h1>⏱ שעון נוכחות</h1>
<div id="clock">--:--:--</div>
<div id="date-display"></div>

<button class="btn" id="btn-in"  onclick="punch('IN')">🟢 כניסה</button>
<button class="btn" id="btn-out" onclick="punch('OUT')">🔴 יציאה</button>
<div id="status"></div>

<button class="btn" id="btn-sub" onclick="submitAll()">
  📤 שלח ל-Isufit <span id="pending-badge" class="badge" style="display:none">0</span>
</button>
<button class="btn" id="btn-view" onclick="toggleRecords()">📋 הצג רשומות שמורות</button>

<div id="records-panel">
  <h3>רשומות שמורות</h3>
  <div id="records-list"></div>
</div>

<div id="config-link">
  עובד: <strong id="display-worker"></strong> |
  <a href="#" onclick="showConfig()">הגדרות</a>
</div>

<script>
const ISUFIT = 'https://extisufit.ngsoft.com/isufit';
let workerCode = localStorage.getItem('isufit_worker') || '';
let loginOpened = false;
let editingDate = null;
document.getElementById('display-worker').textContent = workerCode || 'לא הוגדר';

// ── Clock ──────────────────────────────────────────
function tick() {
  const n = new Date();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                  'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  document.getElementById('date-display').textContent =
    `יום ${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(tick, 1000); tick();

// ── Helpers ────────────────────────────────────────
function todayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function nowHHMM() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function getAllRecords() {
  return JSON.parse(localStorage.getItem('isufit_records') || '{}');
}
function saveAllRecords(obj) {
  localStorage.setItem('isufit_records', JSON.stringify(obj));
  updateBadge();
}

// ── Punch ──────────────────────────────────────────
function punch(type) {
  const key   = todayKey();
  const time  = nowHHMM();
  const recs  = getAllRecords();
  if (!recs[key]) recs[key] = { in: '', out: '', submitted: false };
  if (type === 'IN') {
    recs[key].in = time;
    showStatus(`✅ כניסה נשמרה: ${time}`, 'ok');
  } else {
    recs[key].out = time;
    showStatus(`✅ יציאה נשמרה: ${time}`, 'ok');
  }
  saveAllRecords(recs);
  renderRecords();
}

// ── Submit all ─────────────────────────────────────
async function submitAll() {
  if (!workerCode) {
    showStatus('⚠️ נא להגדיר קוד עובד בהגדרות', 'err');
    showConfig();
    return;
  }
  const recs = getAllRecords();
  const pending = Object.entries(recs).filter(([,v]) => !v.submitted && (v.in || v.out));
  if (pending.length === 0) {
    showStatus('אין רשומות חדשות לשליחה', 'info');
    return;
  }

  if (!loginOpened) {
    const win = window.open(`${ISUFIT}/login.aspx`, 'isufit_submit');
    if (!win) {
      showStatus('⚠️ נא לאפשר חלונות קופצים (popups) לאתר זה', 'err');
      return;
    }
    loginOpened = true;
    showStatus('🔐 התחבר ל-Isufit בחלון שנפתח, ואז לחץ שוב על "שלח"', 'info', true);
    return;
  }

  const submitWin = window.open('', 'isufit_submit');
  if (!submitWin) {
    showStatus('⚠️ נא לאפשר חלונות קופצים (popups) לאתר זה', 'err');
    loginOpened = false;
    return;
  }

  showStatus(`⏳ שולח ${pending.length} ימים...`, 'info');
  document.getElementById('btn-sub').disabled = true;
  let ok = 0, fail = 0;
  for (const [date, rec] of pending) {
    if (submitWin.closed) {
      showStatus('⚠️ חלון השליחה נסגר. נא לנסות שוב', 'err');
      fail++;
      break;
    }
    if (rec.in) {
      const success = sendRecord(date, 'IN122', rec.in);
      if (success) ok++; else fail++;
      await sleep(1500);
    }
    if (rec.out) {
      const success = sendRecord(date, 'OUT122', rec.out);
      if (success) ok++; else fail++;
      await sleep(1500);
    }
    if (fail === 0) {
      recs[date].submitted = true;
    }
  }
  saveAllRecords(recs);
  renderRecords();
  document.getElementById('btn-sub').disabled = false;
  await sleep(500);
  if (submitWin && !submitWin.closed) {
    window.open(`${ISUFIT}/MainPage.aspx`, 'isufit_submit');
  }
  loginOpened = false;
  if (fail === 0) {
    showStatus(`✅ נשלחו ${ok} רשומות — בדוק ב-Isufit שהנתונים עודכנו`, 'ok');
  } else {
    showStatus(`⚠️ ${ok} הצליחו, ${fail} נכשלו. נסה שוב`, 'err');
  }
}

function sendRecord(date, tbName, value) {
  try {
    const form = document.createElement('form');
    form.method = 'GET';
    form.action = `${ISUFIT}/ops/opSaveTBChange.aspx`;
    form.target = 'isufit_submit';
    form.style.display = 'none';
    [['workerCode', workerCode], ['forDate', date], ['tbName', tbName], ['newVal', value], ['caller', 'main']].forEach(([n, v]) => {
      const inp = document.createElement('input');
      inp.type = 'hidden'; inp.name = n; inp.value = v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    form.remove();
    return true;
  } catch (e) {
    return false;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── UI helpers ─────────────────────────────────────
function showStatus(msg, type, persist) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = type; el.style.display = 'block';
  if (!persist && type !== 'err') setTimeout(() => el.style.display = 'none', 5000);
}

function updateBadge() {
  const recs = getAllRecords();
  const count = Object.values(recs).filter(v => !v.submitted && (v.in || v.out)).length;
  const badge = document.getElementById('pending-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-block' : 'none';
}

function toggleRecords() {
  const panel = document.getElementById('records-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
  renderRecords();
}

function renderRecords() {
  const recs = getAllRecords();
  const list = document.getElementById('records-list');
  list.innerHTML = '';
  const sorted = Object.keys(recs).sort().reverse();
  if (sorted.length === 0) {
    list.innerHTML = '<div class="rec-row" style="color:#666">אין רשומות</div>';
    return;
  }
  for (const date of sorted) {
    const r = recs[date];
    const row = document.createElement('div');
    row.className = 'rec-row' + (r.submitted ? ' submitted' : '');
    row.innerHTML = `
      <span class="date">${date} ${r.submitted ? '✓' : ''}</span>
      <span class="times">🟢 ${r.in||'--'} &nbsp; 🔴 ${r.out||'--'}</span>
      <span class="del" onclick="deleteRecord('${date}')">✕</span>`;
    list.appendChild(row);
  }
}

function deleteRecord(date) {
  if (!confirm(`מחק רשומה לתאריך ${date}?`)) return;
  const recs = getAllRecords();
  delete recs[date];
  saveAllRecords(recs);
  renderRecords();
}

function editRecord(date) {
  if (editingDate) cancelEdit(editingDate);
  editingDate = date;
  const r = getAllRecords()[date];

  const timesEl   = document.getElementById('times-'   + date);
  const actionsEl = document.getElementById('actions-' + date);

  const inInput  = document.createElement('input');
  inInput.type   = 'time';
  inInput.id     = 'edit-in-' + date;
  inInput.value  = r.in  || '';

  const outInput  = document.createElement('input');
  outInput.type   = 'time';
  outInput.id     = 'edit-out-' + date;
  outInput.value  = r.out || '';

  timesEl.textContent = '';
  timesEl.append('\uD83D\uDFE2 ', inInput, '\u00a0 \uD83D\uDD34 ', outInput);

  const saveBtn = document.createElement('span');
  saveBtn.className   = 'save';
  saveBtn.textContent = '\u2713';
  saveBtn.onclick     = () => saveRecord(date);

  const cancelBtn = document.createElement('span');
  cancelBtn.className   = 'cancel';
  cancelBtn.textContent = '\u2717';
  cancelBtn.onclick     = () => cancelEdit(date);

  actionsEl.textContent = '';
  actionsEl.append(saveBtn, cancelBtn);
}

function saveRecord(date) {
  const recs       = getAllRecords();
  recs[date].in    = document.getElementById('edit-in-'  + date).value;
  recs[date].out   = document.getElementById('edit-out-' + date).value;
  recs[date].submitted = false;
  editingDate      = null;
  saveAllRecords(recs);
  renderRecords();
}

function cancelEdit(date) {
  editingDate = null;
  renderRecords();
}


function showConfig() {
  const code = prompt('קוד עובד (Worker Code):', workerCode);
  if (code && code.trim()) {
    workerCode = code.trim();
    localStorage.setItem('isufit_worker', workerCode);
    document.getElementById('display-worker').textContent = workerCode;
    showStatus('✅ קוד עובד עודכן', 'ok');
  }
}

// Init
updateBadge();
</script>
</body>
</html>
